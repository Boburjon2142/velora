services:
  - type: web
    name: tourist-comfort-finder
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TRAVELER_EMAIL
        sync: false
      - key: TRAVELER_PASSWORD
        sync: false
databases:
  - name: tourist-comfort-finder-db
    plan: free
